spring.application.name=mshop-api

spring.datasource.url=jdbc:mysql://localhost:3306/mshop_db?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true
spring.datasource.username=your_database_username
spring.datasource.password=your_database_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok

spring.jackson.time-zone=Asia/Bangkok

jwt.secret=your_jwt_secret_key_here_minimum_256_bits
jwt.expiration=86400000
